[package]
name = "wasm-stress-test"
version = "0.1.0"
edition = "2024"

[lib]
crate-type = ["cdylib"]

[dependencies]
dofasset-renderer = { path = "../renderer" }
vello = "0.5"
wgpu = "24"
winit = "0.30"
pollster = "0.4"
wasm-bindgen = "0.2.115"
wasm-bindgen-futures = "0.4"
js-sys = "0.3"
web-sys = { version = "0.3", features = ["HtmlCanvasElement"] }
console_error_panic_hook = "0.1"

[patch.crates-io]
wgpu = { path = "../../patches/wgpu" }

[profile.release]
codegen-units = 1
