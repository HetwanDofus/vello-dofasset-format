[package]
name = "dofasset-renderer"
version = "0.1.0"
edition = "2024"

[lib]
name = "dofasset_renderer"
path = "src/lib.rs"

[dependencies]
vello = "0.5"
vello_svg = "0.7"
wgpu = "24"
pollster = "0.4"
image = "0.25"
bytemuck = { version = "1", features = ["derive"] }
serde_json = "1"
winit = "0.30"

[[bin]]
name = "dofasset-renderer"
path = "src/main.rs"

[[bin]]
name = "bench"
path = "src/bench.rs"

[[bin]]
name = "windowed"
path = "src/windowed.rs"

[[bin]]
name = "svg-renderer"
path = "src/svg_renderer.rs"

[[bin]]
name = "usvg-roundtrip"
path = "src/usvg_roundtrip.rs"
